syntax = "proto3";

import "google/protobuf/timestamp.proto";

package ryden.places.v1;

option go_package = "github.com/goghi48/ryden/gen/go/ryden/places/v1;placesv1";

service PlaceService {
  rpc CreatePlace (CreatePlaceRequest) returns (CreatePlaceResponse);
  rpc GetPlace (GetPlaceRequest) returns (GetPlaceResponse);
  rpc ListPlaces (ListPlacesRequest) returns (ListPlacesResponse);
  rpc CreatePlaceReport (CreatePlaceReportRequest) returns (CreatePlaceReportResponse);
}

message CreatePlaceRequest {
  string title = 1;
  string description = 2;
  string address = 3;
  string city = 4;
  double latitude = 5;
  double longitude = 6;
  string created_by_user_id = 7;
  repeated string category_ids = 8;
}

message CreatePlaceResponse {
  Place place = 1;
}

message GetPlaceRequest {
  string id = 1;
}

message GetPlaceResponse {
  Place place = 1;
}

message ListPlacesRequest {
  string city = 1;
  int32 limit = 2;
}

message ListPlacesResponse {
  repeated Place places = 1;
}

message Category {
  string id = 1;
  string name = 2;
  string slug = 3;
  google.protobuf.Timestamp created_at = 4;
}

message Place {
  string id = 1;
  string title = 2;
  string description = 3;
  string address = 4;
  string city = 5;
  double latitude = 6;
  double longitude = 7;
  string created_by_user_id = 8;
  PlaceStatus status = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
  repeated Category categories = 12;
}

enum PlaceStatus {
  PLACE_STATUS_UNSPECIFIED = 0;
  PLACE_STATUS_PENDING_REVIEW = 1;
  PLACE_STATUS_APPROVED = 2;
  PLACE_STATUS_REJECTED = 3;
  PLACE_STATUS_ARCHIVED = 4;
}

message CreatePlaceReportRequest {
  string place_id = 1;
  string reported_by_user_id = 2;
  PlaceReportReason reason = 3;
  string comment = 4;
}

message CreatePlaceReportResponse {
  PlaceReport place_report = 1;
}

message PlaceReport {
  string id = 1;
  string place_id = 2;
  string reported_by_user_id = 3;
  PlaceReportReason reason = 4;
  string comment = 5;
  PlaceReportStatus status = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp resolved_at = 8;
}

enum PlaceReportReason {
  PLACE_REPORT_REASON_UNSPECIFIED = 0;
  PLACE_REPORT_REASON_SPAM = 1;
  PLACE_REPORT_REASON_OFFENSIVE_CONTENT = 2;
  PLACE_REPORT_REASON_WRONG_INFO = 3;
  PLACE_REPORT_REASON_DUPLICATE = 4;
  PLACE_REPORT_REASON_CLOSED_PLACE = 5;
  PLACE_REPORT_REASON_OTHER = 6;
}

enum PlaceReportStatus {
  PLACE_REPORT_STATUS_UNSPECIFIED = 0;
  PLACE_REPORT_STATUS_OPEN = 1;
  PLACE_REPORT_STATUS_RESOLVED = 2;
  PLACE_REPORT_STATUS_REJECTED = 3;
}
