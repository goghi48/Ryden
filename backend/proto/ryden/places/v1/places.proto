syntax = "proto3";

import "google/protobuf/timestamp.proto";

package ryden.places.v1;

option go_package = "github.com/goghi48/ryden/gen/go/ryden/places/v1;placesv1";

service PlaceService {
  rpc CreatePlace (CreatePlaceRequest) returns (CreatePlaceResponse);
  rpc GetPlace (GetPlaceRequest) returns (GetPlaceResponse);
  rpc ListPlaces (ListPlacesRequest) returns (ListPlacesResponse);

}

message CreatePlaceRequest {
  string title = 1;
  string description = 2;
  string address = 3;
  string city = 4;
  double latitude = 5;
  double longitude = 6;
  string created_by_user_id = 7;
}

message CreatePlaceResponse {
  Place place = 1;
}

message GetPlaceRequest {
  string id = 1;
}

message GetPlaceResponse {
  Place place = 1;
}

message ListPlacesRequest {
  string city = 1;
  int32 limit = 2;
}

message ListPlacesResponse {
  repeated Place places = 1;
}

message Place {
  string id = 1;
  string title = 2;
  string description = 3;
  string address = 4;
  string city = 5;
  double latitude = 6;
  double longitude = 7;
  string created_by_user_id = 8;
  PlaceStatus status = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

enum PlaceStatus {
    PLACE_STATUS_UNSPECIFIED = 0;
    PLACE_STATUS_PENDING_REVIEW = 1;
    PLACE_STATUS_APPROVED = 2;
    PLACE_STATUS_REJECTED = 3;
    PLACE_STATUS_ARCHIVED = 4;
}



